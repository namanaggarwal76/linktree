    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .profile {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #38bdf8;
            object-fit: cover;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 35px;
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;

            text-decoration: none;
            color: white;

            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;

            padding: 16px;
            margin: 15px 0;

            transition: 0.25s;
            font-size: 1.1rem;
        }

        .link:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-3px);
        }
    </style>
</head>
